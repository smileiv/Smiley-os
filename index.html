<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smiley OS</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- JSZip & PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';</script>

    <style>
        body { background-color: #020617; color: #e2e8f0; font-family: -apple-system, sans-serif; overflow: hidden; margin: 0; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // --- SVGS ---
        const SVG = {
            Upload: () => <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" strokeWidth="2" fill="none"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>,
            Database: () => <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" strokeWidth="2" fill="none"><ellipse cx="12" cy="5" rx="9" ry="3"></ellipse><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path></svg>,
            Message: () => <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" strokeWidth="2" fill="none"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>,
            Tool: () => <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" strokeWidth="2" fill="none"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg>,
            Trash: () => <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" strokeWidth="2" fill="none"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>,
            Send: () => <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" strokeWidth="2" fill="none"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>,
            Bot: () => <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" strokeWidth="2" fill="none"><rect x="3" y="11" width="18" height="10" rx="2"></rect><circle cx="12" cy="5" r="2"></circle><path d="M12 7v4"></path><line x1="8" y1="16" x2="8" y2="16"></line><line x1="16" y1="16" x2="16" y2="16"></line></svg>,
            Cpu: () => <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" strokeWidth="2" fill="none"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect><rect x="9" y="9" width="6" height="6"></rect><line x1="9" y1="1" x2="9" y2="4"></line><line x1="15" y1="1" x2="15" y2="4"></line><line x1="9" y1="20" x2="9" y2="23"></line><line x1="15" y1="20" x2="15" y2="23"></line><line x1="20" y1="9" x2="23" y2="9"></line><line x1="20" y1="14" x2="23" y2="14"></line><line x1="1" y1="9" x2="4" y2="9"></line><line x1="1" y1="14" x2="4" y2="14"></line></svg>,
            Cloud: () => <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" strokeWidth="2" fill="none"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"></path></svg>,
            Save: () => <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" strokeWidth="2" fill="none"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
        };

        const App = () => {
            const [view, setView] = useState('command');
            const [modelName, setModelName] = useState(localStorage.getItem('smileyModel') || 'gemini-2.5-flash-preview-09-2025');
            const [archives, setArchives] = useState([]);
            
            useEffect(() => { 
                localStorage.setItem('smileyModel', modelName);
            }, [modelName]);

            return (
                <div className="flex flex-col md:flex-row h-screen w-full bg-[#050505]">
                    {/* SIDEBAR */}
                    <nav className="order-last md:order-first w-full md:w-24 bg-slate-900 border-t md:border-t-0 md:border-r border-slate-800 flex flex-row md:flex-col items-center justify-around md:justify-start md:py-6 shrink-0 z-50">
                        <div className="hidden md:block mb-8 text-indigo-500 font-black tracking-widest text-xs rotate-180" style={{writingMode: 'vertical-rl'}}>SMILEY OS</div>
                        
                        <NavBtn active={view==='command'} icon={<SVG.Message/>} onClick={() => setView('command')} label="Command" />
                        <NavBtn active={view==='hopper'} icon={<SVG.Upload/>} onClick={() => setView('hopper')} label="Hopper" />
                        <NavBtn active={view==='memory'} icon={<SVG.Database/>} onClick={() => setView('memory')} label="Memory" badge={archives.length} />
                        <NavBtn active={view==='tools'} icon={<SVG.Tool/>} onClick={() => setView('tools')} label="Utilities" />
                        
                        <div className="hidden md:flex flex-col mt-auto w-full px-2 gap-2">
                            <select value={modelName} onChange={e=>setModelName(e.target.value)} className="w-full bg-slate-950 border border-indigo-900 text-indigo-400 text-[10px] font-bold rounded px-1 py-2 text-center outline-none cursor-pointer">
                                <option value="gemini-2.5-flash-preview-09-2025">Flash (Fast)</option>
                                <option value="gemini-2.5-pro">Pro (Smart)</option>
                            </select>
                        </div>
                    </nav>

                    {/* MAIN AREA */}
                    <main className="flex-1 overflow-hidden flex flex-col relative pb-16 md:pb-0">
                        <div className="md:hidden bg-slate-900 border-b border-slate-800 p-2 flex justify-between items-center absolute top-0 w-full z-40">
                            <span className="font-black text-indigo-500 text-xs tracking-widest flex items-center gap-1"><SVG.Cpu/> PRO</span>
                            <div className="flex gap-2">
                                <select value={modelName} onChange={e=>setModelName(e.target.value)} className="w-24 bg-slate-950 border border-indigo-900 text-indigo-400 text-[10px] font-bold rounded px-1 py-1 text-center outline-none">
                                    <option value="gemini-2.5-flash-preview-09-2025">Flash Core</option>
                                    <option value="gemini-2.5-pro">Pro Core</option>
                                </select>
                            </div>
                        </div>
                        <div className="md:hidden h-10 shrink-0"></div>

                        {view === 'hopper' && <HopperModule setArchives={setArchives} archives={archives} setView={setView} />}
                        {view === 'memory' && <MemoryModule archives={archives} setArchives={setArchives} />}
                        {view === 'command' && <CommandModule archives={archives} modelName={modelName} setArchives={setArchives} />}
                        {view === 'tools' && <ToolsModule modelName={modelName} />}
                    </main>
                </div>
            );
        };

        const NavBtn = ({active, icon, onClick, label, badge}) => (
            <button onClick={onClick} className={`relative p-3 md:mb-4 rounded-xl transition-all ${active ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-900/50' : 'text-slate-500 hover:text-white hover:bg-slate-800'}`}>
                {icon}
                {badge > 0 && <span className="absolute -top-1 -right-1 bg-emerald-500 text-white text-[8px] font-bold px-1.5 py-0.5 rounded-full">{badge}</span>}
                <span className="md:hidden text-[9px] block mt-1">{label}</span>
            </button>
        );

        // ==========================================
        // 1. THE HOPPER MODULE 
        // ==========================================
        const HopperModule = ({ setArchives, archives, setView }) => {
            const [hopperFiles, setHopperFiles] = useState([]);
            const [isCooking, setIsCooking] = useState(false);
            const [logs, setLogs] = useState([]);
            const fileInputRef = useRef(null);
            const folderInputRef = useRef(null);
            const CHUNK_SIZE = 150000; 

            const handleAdd = (e) => {
                const validExtensions = ['.pdf', '.zip', '.json', '.md', '.txt', '.csv'];
                const validFiles = Array.from(e.target.files).filter(f => validExtensions.some(ext => f.name.toLowerCase().endsWith(ext)));
                
                let massiveFile = validFiles.find(f => f.size > 300 * 1024 * 1024); 
                if (massiveFile) {
                    alert(`WARNING: ${massiveFile.name} is extremely large (${(massiveFile.size/1024/1024).toFixed(0)}MB). Unzipping massive Google Takeout files inside a mobile browser may cause the tab to crash due to RAM limits. Proceed at your own risk, or unzip the file in a separate app first.`);
                }

                setHopperFiles(prev => [...prev, ...validFiles]);
                e.target.value = '';
            };

            const cookHopper = async () => {
                setIsCooking(true);
                setLogs(["Starting extraction engine..."]);
                let masterText = "";

                for (const file of hopperFiles) {
                    const filePath = file.webkitRelativePath || file.name;
                    setLogs(p => [...p, `Extracting ${filePath}...`]);
                    masterText += `\n\n=== FILE: ${filePath} ===\n\n`;
                    try {
                        const ext = file.name.split('.').pop().toLowerCase();
                        if (ext === 'pdf') {
                            const arrayBuffer = await file.arrayBuffer();
                            const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
                            for (let i=1; i<=pdf.numPages; i++) {
                                const page = await pdf.getPage(i);
                                const content = await page.getTextContent();
                                masterText += content.items.map(item => item.str).join(' ') + "\n";
                            }
                        } else if (ext === 'zip') {
                            const zip = new window.JSZip();
                            const contents = await zip.loadAsync(file);
                            for (const [filename, zipEntry] of Object.entries(contents.files)) {
                                if (!zipEntry.dir && filename.match(/\.(txt|md|json|csv)$/i)) {
                                    masterText += await zipEntry.async("string") + "\n";
                                }
                            }
                        } else {
                            masterText += await file.text();
                        }
                    } catch(e) { setLogs(p => [...p, `Error on ${file.name}`]); }
                }

                setLogs(p => [...p, `Slicing into AI-safe chunks...`]);
                const newArchives = [];
                for (let i = 0; i < masterText.length; i += CHUNK_SIZE) {
                    newArchives.push({
                        id: 'arc_' + Date.now() + i,
                        title: `Payload Chunk ${archives.length + newArchives.length + 1}`,
                        date: new Date().toLocaleTimeString(),
                        text: masterText.slice(i, i + CHUNK_SIZE)
                    });
                }
                
                setArchives(prev => [...prev, ...newArchives]);
                setHopperFiles([]);
                setIsCooking(false);
                setView('memory');
            };

            return (
                <div className="flex-1 overflow-y-auto p-6 md:p-10 flex flex-col items-center">
                    <div className="max-w-2xl w-full">
                        <h2 className="text-3xl font-black text-white mb-2">THE HOPPER</h2>
                        <p className="text-slate-500 text-sm mb-8">Ingest PDFs, ZIPs, Drive Folders, and text. Compress into memory.</p>
                        
                        <div className="grid grid-cols-2 gap-4 mb-6">
                            <div onClick={() => fileInputRef.current.click()} className="cursor-pointer bg-slate-900 border border-slate-700 hover:border-indigo-500 rounded-2xl p-6 text-center transition-colors">
                                <input type="file" ref={fileInputRef} multiple onChange={handleAdd} className="hidden" />
                                <div className="text-indigo-500 mb-2 flex justify-center"><SVG.Cloud /></div>
                                <div className="text-xs font-bold text-slate-300">Files (Drive / Local)</div>
                            </div>
                            <div onClick={() => folderInputRef.current.click()} className="cursor-pointer bg-slate-900 border border-slate-700 hover:border-indigo-500 rounded-2xl p-6 text-center transition-colors">
                                <input type="file" ref={folderInputRef} webkitdirectory="true" directory="true" multiple onChange={handleAdd} className="hidden" />
                                <div className="text-indigo-500 mb-2 flex justify-center"><SVG.Database /></div>
                                <div className="text-xs font-bold text-slate-300">Uncompressed Folder</div>
                            </div>
                        </div>

                        {hopperFiles.length > 0 && (
                            <div className="bg-slate-900 rounded-xl p-4 mb-6 max-h-48 overflow-y-auto">
                                <div className="text-xs text-slate-500 font-bold mb-2 border-b border-slate-800 pb-2">STAGED ({hopperFiles.length})</div>
                                {hopperFiles.map((f, i) => (
                                    <div key={i} className="flex justify-between items-center text-xs py-1 text-slate-300">
                                        <span className="truncate">{f.webkitRelativePath || f.name} <span className="text-slate-500 text-[10px]">({(f.size/1024/1024).toFixed(1)}MB)</span></span>
                                        <button onClick={() => setHopperFiles(p => p.filter((_, idx)=>idx!==i))} className="text-red-500 ml-2"><SVG.Trash/></button>
                                    </div>
                                ))}
                            </div>
                        )}

                        <button onClick={cookHopper} disabled={hopperFiles.length===0 || isCooking} className="w-full bg-indigo-600 hover:bg-indigo-500 disabled:bg-slate-800 disabled:text-slate-500 text-white font-black py-4 rounded-xl text-sm transition-all shadow-lg">
                            {isCooking ? 'CRUSHING DATA...' : 'COOK EVERYTHING'}
                        </button>

                        {logs.length > 0 && (
                            <div className="mt-4 bg-black border border-slate-800 rounded-xl p-4 h-32 overflow-y-auto text-[10px] text-indigo-400 font-mono">
                                {logs.map((l, i) => <div key={i}>{'>'} {l}</div>)}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // ==========================================
        // 2. MEMORY MODULE 
        // ==========================================
        const MemoryModule = ({ archives, setArchives }) => {
            const [expanded, setExpanded] = useState(null);

            const download = (arc) => {
                const a = document.createElement('a');
                a.href = URL.createObjectURL(new Blob([arc.text]));
                a.download = `${arc.title}.txt`;
                a.click();
            };

            return (
                <div className="flex-1 overflow-y-auto p-6 md:p-10 custom-scrollbar">
                    <div className="max-w-4xl mx-auto">
                        <div className="flex justify-between items-end mb-8">
                            <div>
                                <h2 className="text-3xl font-black text-white mb-2">MEMORY BANKS</h2>
                                <p className="text-slate-500 text-sm">Review, delete, or export your processed payloads & saved insights.</p>
                            </div>
                            <button onClick={()=>setArchives([])} className="text-red-500 text-xs font-bold hover:underline">Clear All</button>
                        </div>

                        {archives.length === 0 ? (
                            <div className="text-center p-10 border border-dashed border-slate-700 rounded-2xl text-slate-500">Memory empty. Use The Hopper to ingest data, or save Insights from Chat.</div>
                        ) : (
                            <div className="space-y-4">
                                {archives.map(arc => (
                                    <div key={arc.id} className={`bg-slate-900 border rounded-2xl overflow-hidden ${arc.title.includes('Smiley Insight') ? 'border-emerald-500/50' : 'border-slate-800'}`}>
                                        <div className="flex items-center justify-between p-4 cursor-pointer hover:bg-slate-800" onClick={() => setExpanded(expanded === arc.id ? null : arc.id)}>
                                            <div className="font-bold text-white text-sm flex items-center gap-2">
                                                <SVG.Database/> 
                                                <span className={arc.title.includes('Smiley Insight') ? 'text-emerald-400' : ''}>{arc.title}</span>
                                            </div>
                                            <div className="text-xs text-slate-500">{arc.date}</div>
                                        </div>
                                        {expanded === arc.id && (
                                            <div className="p-4 border-t border-slate-800 bg-black">
                                                <div className="flex gap-2 mb-4">
                                                    <button onClick={()=>download(arc)} className="bg-indigo-600 px-4 py-2 rounded text-xs text-white font-bold">Download .TXT</button>
                                                    <button onClick={()=>setArchives(p=>p.filter(a=>a.id!==arc.id))} className="bg-red-900/50 text-red-400 px-4 py-2 rounded text-xs font-bold">Delete</button>
                                                </div>
                                                <div className="h-48 overflow-y-auto text-xs text-slate-400 font-mono p-4 bg-slate-900 rounded-xl whitespace-pre-wrap custom-scrollbar">
                                                    {arc.text}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // ==========================================
        // 3. COMMAND MODULE 
        // ==========================================
        const CommandModule = ({ archives, modelName, setArchives }) => {
            const [history, setHistory] = useState([{role: 'model', text: 'Smiley Pro Online. Ready to receive commands.'}]);
            const [input, setInput] = useState('');
            const [isThinking, setIsThinking] = useState(false);
            const [selectedContext, setSelectedContext] = useState('none');
            const [savedIndices, setSavedIndices] = useState(new Set()); 

            const handleSend = async (e) => {
                e.preventDefault();
                if(!input.trim()) return;
                
                const userMsg = input;
                setInput('');
                setHistory(p => [...p, {role: 'user', text: userMsg}]);
                setIsThinking(true);

                try {
                    let systemPrompt = `You are Smiley, the central AI of Smiley OS, serving Hubert Kilgore / SmileIV LLC.
You possess a dynamic, shapeshifting intelligence. Depending on the user's prompt and the provided context document, you automatically equip the necessary expertise:
1. The Legal Assassin: Aggressive corporate attorney specializing in FCRA, disputes, Force Majeure, and liability shields.
2. The Financial Strategist: LLC ledgers, credit churning, IRS tax shields, and operational scaling.
3. The Forensic Analyst: Parsing raw data, CSVs, logs, and finding hidden connections.
4. The UX/Tech Architect: System building, coding, and web design.

Do not ask the user which persona you should be. Instantly analyze the prompt and adopt the tone and expertise required to accomplish the objective. Be concise, highly strategic, and operational.`;

                    if (selectedContext !== 'none') {
                        const arc = archives.find(a => a.id === selectedContext);
                        if (arc) systemPrompt += `\n\nCRITICAL CONTEXT DOCUMENT:\n${arc.text}`;
                    }

                    // ROUTED TO CLOUDFLARE WORKER PROXY
                    const response = await fetch('https://smiley-proxy.smileivdet.workers.dev/', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            modelName: modelName,
                            geminiPayload: {
                                contents: [{ parts: [{ text: userMsg }] }],
                                systemInstruction: { parts: [{ text: systemPrompt }] }
                            }
                        })
                    });
                    
                    const data = await response.json();
                    if(data.error) throw new Error(data.error.message);
                    setHistory(p => [...p, {role: 'model', text: data.candidates[0].content.parts[0].text}]);
                } catch(err) {
                    setHistory(p => [...p, {role: 'model', text: `Proxy Error: ${err.message || 'Check your Cloudflare Worker URL and configuration.'}`}]);
                } finally {
                    setIsThinking(false);
                }
            };

            const saveInsightToMemory = (text, index) => {
                const newArc = {
                    id: 'arc_insight_' + Date.now(),
                    title: `Smiley Insight (${new Date().toLocaleTimeString()})`,
                    date: new Date().toLocaleDateString(),
                    text: text
                };
                setArchives(p => [newArc, ...p]);
                setSavedIndices(prev => new Set(prev).add(index));
            };

            return (
                <div className="flex-1 flex flex-col h-full bg-[#050505]">
                    <div className="bg-slate-900 border-b border-slate-800 p-4 flex gap-4 shrink-0 items-center">
                        <select value={selectedContext} onChange={e=>setSelectedContext(e.target.value)} className="bg-black border border-slate-700 text-sm text-indigo-400 rounded-lg px-3 py-2 outline-none flex-1 truncate font-bold">
                            <option value="none">Memory Context: Global (None Attached)</option>
                            {archives.map(a => <option key={a.id} value={a.id}>Memory: {a.title}</option>)}
                        </select>
                        <button onClick={()=>setHistory([])} className="text-slate-500 text-xs px-2 hover:text-white shrink-0">Clear Chat</button>
                    </div>

                    <div className="flex-1 overflow-y-auto p-4 custom-scrollbar space-y-6">
                        {history.map((msg, i) => (
                            <div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                <div className={`max-w-[85%] md:max-w-[70%] rounded-2xl p-4 relative group ${msg.role==='user'?'bg-emerald-600 text-white rounded-br-none':'bg-slate-900 border border-slate-800 text-slate-300 rounded-bl-none shadow-lg'}`}>
                                    <div className="flex items-center justify-between mb-2">
                                        <div className="flex items-center gap-2 text-[10px] uppercase font-black tracking-widest opacity-50">
                                            {msg.role === 'user' ? 'You' : <><SVG.Bot/> SMILEY</>}
                                        </div>
                                        
                                        {msg.role === 'model' && i > 0 && (
                                            <button 
                                                onClick={() => saveInsightToMemory(msg.text, i)}
                                                disabled={savedIndices.has(i)}
                                                className={`flex items-center gap-1 text-[9px] font-bold uppercase tracking-wider px-2 py-1 rounded transition-colors ${savedIndices.has(i) ? 'bg-emerald-900/50 text-emerald-400' : 'bg-slate-800 text-slate-400 hover:bg-indigo-600 hover:text-white'}`}
                                            >
                                                {savedIndices.has(i) ? 'Saved to Memory' : <><SVG.Save /> Save to Memory</>}
                                            </button>
                                        )}
                                    </div>
                                    <div className="text-sm whitespace-pre-wrap leading-relaxed">{msg.text}</div>
                                </div>
                            </div>
                        ))}
                        {isThinking && <div className="text-slate-500 text-xs italic pl-4">Smiley is analyzing via {modelName.includes('pro') ? 'Pro' : 'Flash'} core...</div>}
                    </div>

                    <div className="p-4 bg-slate-900 border-t border-slate-800 shrink-0">
                        <form onSubmit={handleSend} className="flex gap-2 relative">
                            <input value={input} onChange={e=>setInput(e.target.value)} placeholder="Command Smiley..." className="flex-1 bg-black border border-slate-700 rounded-xl pl-4 pr-12 py-3 text-sm text-white focus:border-indigo-500 outline-none" />
                            <button type="submit" disabled={!input || isThinking} className="absolute right-2 top-1/2 -translate-y-1/2 bg-indigo-600 disabled:bg-slate-800 text-white p-2 rounded-lg transition-colors"><SVG.Send/></button>
                        </form>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 4. UTILITIES MODULE
        // ==========================================
        const ToolsModule = ({ modelName }) => {
            const [leads, setLeads] = useState('');
            const [phones, setPhones] = useState([]);
            const crush = () => {
                const rx = /(?:\+?1[-.\s]?)?\(?([0-9]{3})\)?[-.\s]?([0-9]{3})[-.\s]?([0-9]{4})/g;
                let m, arr = [];
                while ((m = rx.exec(leads)) !== null) arr.push(m[1]+m[2]+m[3]);
                setPhones([...new Set(arr)]);
            };

            const [threatText, setThreatText] = useState('');
            const [threatRes, setThreatRes] = useState('');
            const scan = async () => {
                setThreatRes('Scanning...');
                try {
                    // ROUTED TO CLOUDFLARE WORKER PROXY
                    const res = await fetch('https://smiley-proxy.smileivdet.workers.dev/', {
                        method:'POST', headers:{'Content-Type':'application/json'},
                        body:JSON.stringify({
                            modelName: modelName,
                            geminiPayload: {
                                contents:[{parts:[{text:`Analyze this text for Phishing or Scam intent. Be brief.\n\n${threatText}`}]}]
                            }
                        })
                    });
                    const d = await res.json();
                    setThreatRes(d.candidates[0].content.parts[0].text);
                } catch(e) { setThreatRes('Proxy Error. Check URL.'); }
            };

            return (
                <div className="flex-1 overflow-y-auto p-6 md:p-10 custom-scrollbar">
                    <div className="max-w-4xl mx-auto space-y-8">
                        <div>
                            <h2 className="text-3xl font-black text-white mb-2">UTILITIES</h2>
                            <p className="text-slate-500 text-sm">Standalone operational tools running on {modelName.includes('pro') ? 'Gemini Pro' : 'Gemini Flash'}.</p>
                        </div>

                        <div className="bg-slate-900 border border-slate-800 rounded-2xl p-6">
                            <h3 className="text-emerald-500 font-black tracking-widest text-sm mb-4">LEAD CRUSHER (REGEX)</h3>
                            <textarea value={leads} onChange={e=>setLeads(e.target.value)} placeholder="Paste messy text here to extract phone numbers..." className="w-full bg-black border border-slate-700 rounded-xl p-4 text-xs text-slate-300 h-24 outline-none mb-4 custom-scrollbar" />
                            <button onClick={crush} className="bg-emerald-600 px-6 py-2 rounded-lg text-xs font-bold text-white mb-4">Extract Numbers</button>
                            {phones.length > 0 && (
                                <div className="bg-black p-4 rounded-xl text-xs text-emerald-400 font-mono grid grid-cols-2 md:grid-cols-4 gap-2">
                                    {phones.map((p,i)=><div key={i}>{p}</div>)}
                                </div>
                            )}
                        </div>

                        <div className="bg-slate-900 border border-slate-800 rounded-2xl p-6">
                            <h3 className="text-red-500 font-black tracking-widest text-sm mb-4">THREAT FORENSICS</h3>
                            <textarea value={threatText} onChange={e=>setThreatText(e.target.value)} placeholder="Paste suspicious email or text message..." className="w-full bg-black border border-slate-700 rounded-xl p-4 text-xs text-slate-300 h-24 outline-none mb-4 custom-scrollbar" />
                            <button onClick={scan} className="bg-red-600 px-6 py-2 rounded-lg text-xs font-bold text-white mb-4">Run AI Scan</button>
                            {threatRes && (
                                <div className="bg-red-950/30 border border-red-900/50 p-4 rounded-xl text-xs text-slate-300 whitespace-pre-wrap">{threatRes}</div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
